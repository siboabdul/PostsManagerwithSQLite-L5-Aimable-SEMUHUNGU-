name: offline_posts_manager
description: A Flutter app to manage posts offline using SQLite.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # 🗄️ Database (SQLite)
  sqflite: ^2.3.0

  # 📁 Path for database location
  path: ^1.8.3

  # 🖼️ Image picker
  image_picker: ^1.0.7

  # 🎨 Icons (default Flutter icons)
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true